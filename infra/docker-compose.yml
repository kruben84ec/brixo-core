version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: brixo-postgres
    restart: unless-stopped
    env_file:
      - ./env/db.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: brixo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
    container_name: brixo-backend
    restart: unless-stopped
    environment:
      - ENV_DIR=/app/env
    env_file:
      - ./env/backend.env
      - ./env/jwt.env
      - ./env/redis.env
    depends_on:
      - postgres
      - redis        # ← agrega esta dependencia
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend/Dockerfile
    container_name: brixo-frontend
    restart: unless-stopped
    env_file:
      - ./env/frontend.env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:        # ← agrega este volumen
[pytest]
# Configuración de pytest para el proyecto Brixo

# Directorio raíz de tests
testpaths = tests

# Patrón de descubrimiento de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de ejecución
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers personalizados
markers =
    unit: Tests unitarios
    integration: Tests de integración
    slow: Tests que tardan mucho
    auth: Tests de autenticación

# Cobertura
[coverage:run]
branch = True
source = .
omit =
    */venv/*
    */tests/*
    */conftest.py
    */main.py
    */db_wait.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
